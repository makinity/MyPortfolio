<div class="page-header">
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="gallerySearch" class="search-input" placeholder="Search images by title...">
    </div>
    <div class="header-actions">
        <button class="btn btn-primary btn-add" id="btnUploadImage"><i class="fas fa-plus"></i> Upload Image</button>
    </div>
</div>

<div class="dashboard-grid" id="galleryGrid">
    <!-- Gallery items will be dynamically injected here -->
    <div class="loading-state" style="grid-column: 1 / -1; padding: 3rem;">
        <i class="fas fa-circle-notch fa-spin"></i>
        <p>Loading gallery items...</p>
    </div>
</div>
