<div class="page-header">
    <h1 class="page-title">Specialty Banner</h1>
</div>

<div class="card">
    <form id="specialtyForm">
        <div class="form-row">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="specTitle" placeholder="e.g. Experienced in API Integrations">
            </div>
            <div class="form-group">
                <label>Main Icon (e.g. fas fa-code)</label>
                <input type="text" id="specIconMain" placeholder="fas fa-code">
            </div>
            <div class="form-group">
                <label>Header Icon (e.g. fas fa-rocket)</label>
                <input type="text" id="specIconHeader" placeholder="fas fa-rocket">
            </div>
        </div>

        <div class="form-row" style="margin-top: 1rem;">
            <div class="form-group">
                <label>Button Text</label>
                <input type="text" id="specBtnText" placeholder="e.g. Start a Project">
            </div>
            <div class="form-group">
                <label>Button Link</label>
                <input type="text" id="specBtnLink" placeholder="#contact">
            </div>
        </div>
        
        <div class="form-group" style="margin-top: 1.5rem;">
            <label>Description</label>
            <textarea id="specDesc" rows="4" placeholder="Describe your specialty..."></textarea>
        </div>
        
        <div style="margin-top: 2rem; display: flex; justify-content: flex-end;">
            <button type="submit" class="btn btn-success" style="width: auto; padding: 0.75rem 2rem;">
                <i class="fas fa-save"></i> Save Specialty Banner
            </button>
        </div>
    </form>
</div>
