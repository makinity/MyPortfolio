<div class="page-header">
    <h1 class="page-title">Specialty Banner</h1>
</div>

<div class="card">
    <form class="mock-form">
        <div class="form-row">
            <div class="form-group">
                <label>Title</label>
                <input type="text" style="width: 100%; padding: 0.75rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);" value="Experienced in API Integrations">
            </div>
            <div class="form-group">
                <label>Main Icon Class (Background Icon)</label>
                <input type="text" style="width: 100%; padding: 0.75rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);" value="fas fa-cloud-upload-alt">
            </div>
            <div class="form-group">
                <label>Small Icon Class (Title Icon)</label>
                <input type="text" style="width: 100%; padding: 0.75rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);" value="fas fa-plug">
            </div>
        </div>
        
        <div class="form-group" style="margin-top: 1.5rem;">
            <label>Description</label>
            <textarea style="min-height: 100px;">I integrate third-party APIs including Stripe, PayPal, Google Maps, Twilio, SendGrid, and more. From payment processing to communication services, I connect applications with powerful external services.</textarea>
        </div>
        
        <div style="margin-top: 2rem; display: flex; justify-content: flex-end;">
            <button type="submit" class="btn btn-success" style="width: auto; padding: 0.75rem 2rem;">
                <i class="fas fa-save"></i> Save Specialty Banner
            </button>
        </div>
    </form>
</div>
