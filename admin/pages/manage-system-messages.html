<div class="page-header">
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="messageSearch" class="search-input" placeholder="Search messages by name, email or subject...">
    </div>
    <div class="header-actions">
        <button class="btn btn-primary btn-add" id="refreshMessages"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Subject</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="messagesList">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>
</div>
