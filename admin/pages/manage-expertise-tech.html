<div class="page-header">
    <h1 class="page-title">Core Tech Stack</h1>
    <button class="btn btn-primary" onclick="openModal('Add Tech Stack Item', `
        <div class='form-group'>
            <label>Technology Name</label>
            <input type='text' style='width: 100%; padding: 0.75rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);' placeholder='e.g., React'>
        </div>
        <div class='form-group'>
            <label>Icon Class (FontAwesome)</label>
            <input type='text' style='width: 100%; padding: 0.75rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);' placeholder='fab fa-react'>
        </div>
    `)"><i class="fas fa-plus"></i> Add Tech</button>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Technology</th>
                    <th>Icon Class</th>
                    <th>Sort Order</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><i class="fab fa-html5" style="color: #e34f26; width: 20px;"></i> HTML5</td>
                    <td>fab fa-html5</td>
                    <td>1</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-icon delete" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td><i class="fab fa-css3-alt" style="color: #1572b6; width: 20px;"></i> CSS3</td>
                    <td>fab fa-css3-alt</td>
                    <td>2</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-icon delete" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td><i class="fab fa-js" style="color: #f7df1e; width: 20px;"></i> JavaScript</td>
                    <td>fab fa-js</td>
                    <td>3</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-icon delete" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
