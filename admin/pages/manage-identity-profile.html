<div class="page-header">
    <h1 class="page-title">Profile Details</h1>
</div>

<div class="card">
    <form id="profileForm">
        <div class="form-row">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="profFullName" placeholder="e.g. Mark Vencent L. Juntilla">
            </div>
            <div class="form-group">
                <label>Role</label>
                <input type="text" id="profRole" placeholder="e.g. Full Stack Developer">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="profLocation" placeholder="e.g. Davao del Sur, Philippines">
            </div>
            <div class="form-group">
                <label>Profile Image</label>
                <input type="file" id="profFile" accept="image/*">
                <p id="currentImageName" style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem;"></p>
            </div>
        </div>

        <div class="form-group">
            <label>About Me (Primary Paragraph)</label>
            <textarea id="profAboutPrimary" rows="4" placeholder="Briefly describe yourself..."></textarea>
        </div>

        <div class="form-group">
            <label>About Me (Secondary Paragraph)</label>
            <textarea id="profAboutSecondary" rows="4" placeholder="Additional details about your journey..."></textarea>
        </div>
        
        <div style="margin-top: 1rem; display: flex; justify-content: flex-end; gap: 1rem;">
            <a href="https://portfolio-chat.makidevportfolio.workers.dev/auth/google" class="btn btn-primary" id="connectGmailBtn" style="width: auto; padding: 0.75rem 2rem; display: none;">
                <i class="fab fa-google"></i> Connect Gmail
            </a>
            <button type="submit" class="btn btn-success" style="width: auto; padding: 0.75rem 2rem;">
                <i class="fas fa-save"></i> Save Profile Details
            </button>
        </div>
    </form>
</div>
