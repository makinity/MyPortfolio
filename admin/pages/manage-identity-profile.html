<div class="page-header">
    <h1 class="page-title">Profile Details</h1>
</div>

<div class="card">
    <form class="mock-form">
        <div class="form-row">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" value="Marky Vencent L. Juntilla">
                </div>
            </div>
            <div class="form-group">
                <label>Role</label>
                <div class="input-icon">
                    <i class="fas fa-briefcase"></i>
                    <input type="text" value="Web Developer">
                </div>
            </div>
            <div class="form-group">
                <label>Location</label>
                <div class="input-icon">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" value="Sulop, Davao del Sur">
                </div>
            </div>
            <div class="form-group">
                <label>Profile Image URL</label>
                <div class="input-icon">
                    <i class="fas fa-image"></i>
                    <input type="text" value="assets/images/profile/1.jpg">
                </div>
            </div>
        </div>
        
        <div style="margin-top: 2rem; display: flex; justify-content: flex-end;">
            <button type="submit" class="btn btn-success" style="width: auto; padding: 0.75rem 2rem;">
                <i class="fas fa-save"></i> Save Profile Details
            </button>
        </div>
    </form>
</div>
