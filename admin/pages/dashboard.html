<div class="page-header">
    <h1 class="page-title">Dashboard Overview</h1>
    <button id="refreshDashboard" class="btn btn-primary btn-sm"><i class="fas fa-sync-alt"></i> Refresh Data</button>
</div>

<div class="dashboard-grid">
    <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-project-diagram"></i></div>
        <div class="stat-info">
            <h3 id="statTotalProjects">0</h3>
            <p>Total Projects</p>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-images"></i></div>
        <div class="stat-info">
            <h3 id="statTotalGallery">0</h3>
            <p>Gallery Images</p>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-code"></i></div>
        <div class="stat-info">
            <h3 id="statTotalTech">0</h3>
            <p>Tech Stack Items</p>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-envelope"></i></div>
        <div class="stat-info">
            <h3 id="statUnreadMessages">0</h3>
            <p>Unread Messages</p>
        </div>
    </div>
</div>

<div class="form-row" style="margin-bottom: 1.5rem;">
    <div class="card" style="margin-bottom: 0; display: flex; flex-direction: column;">
        <h3 style="margin-bottom: 1rem;">Messages Received</h3>
        <div style="position: relative; height: 250px; width: 100%; flex: 1;">
            <canvas id="viewsChart"></canvas>
        </div>
    </div>
    <div class="card" style="margin-bottom: 0; display: flex; flex-direction: column;">
        <h3 style="margin-bottom: 1rem;">Project Tech Stack Distribution</h3>
        <div style="position: relative; height: 250px; width: 100%; flex: 1;">
            <canvas id="techChart"></canvas>
        </div>
    </div>
</div>

<div class="card">
    <h3 style="margin-bottom: 1rem;">Recent Activity</h3>
    <div class="table-responsive">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Action</th>
                    <th>Item</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="recentActivityBody">
                <tr><td colspan="3" style="text-align: center; padding: 2rem;">Loading activity...</td></tr>
            </tbody>
        </table>
    </div>
</div>
