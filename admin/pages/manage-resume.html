<div class="page-header">
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="resumeSearch" class="search-input" placeholder="Search resumes by title...">
    </div>
    <div class="header-actions">
        <button class="btn btn-primary btn-add" id="addResumeBtn"><i class="fas fa-plus"></i> Add Resume</button>
    </div>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Preview</th>
                    <th>Title</th>
                    <th>Status</th>
                    <th>File</th>
                    <th>Updated</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="resumeList">
                <tr>
                    <td colspan="6" style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                        Loading resumes...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
