<div class="page-header">
    <div>
        <h1 class="page-title">My Resume</h1>
        <p style="margin-top: 0.35rem; color: var(--text-secondary);">
            Upload resume PDFs and choose which one is active on the portfolio.
        </p>
    </div>
    <button class="btn btn-primary" id="addResumeBtn"><i class="fas fa-plus"></i> Add Resume</button>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Status</th>
                    <th>File</th>
                    <th>Updated</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="resumeList">
                <tr>
                    <td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                        Loading resumes...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
