<div class="page-header">
    <h1 class="page-title">Quick Facts</h1>
    <button class="btn btn-primary" onclick="openModal('Add Quick Fact', `
        <div class='form-group'>
            <label>Fact Text</label>
            <input type='text' style='width: 100%; padding: 0.75rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);' placeholder='e.g., Based in Davao del Sur'>
        </div>
        <div class='form-group'>
            <label>Icon Class (FontAwesome)</label>
            <input type='text' style='width: 100%; padding: 0.75rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);' placeholder='fas fa-location-dot'>
        </div>
    `)"><i class="fas fa-plus"></i> Add Fact</button>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Fact</th>
                    <th>Icon Class</th>
                    <th>Sort Order</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><i class="fas fa-location-dot" style="color: var(--blue-primary); width: 20px;"></i> Based in Davao del Sur</td>
                    <td>fas fa-location-dot</td>
                    <td>1</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-icon delete" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td><i class="fas fa-code" style="color: var(--blue-primary); width: 20px;"></i> 2+ years coding experience</td>
                    <td>fas fa-code</td>
                    <td>2</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-icon delete" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
